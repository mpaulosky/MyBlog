name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'dev' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const pullRequestId = context.payload.pull_request.node_id;
            const pullNumber = context.payload.pull_request.number;
            const mutation = `mutation EnableAutoMerge($pullRequestId: ID!) {
              enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                pullRequest { number }
              }
            }`;

            const isUnstable = message =>
              message.includes("unstable status") ||
              message.includes("UNPROCESSABLE");

            for (let attempt = 1; attempt <= 5; attempt++) {
              try {
                await github.graphql(mutation, { pullRequestId });
                core.info(`Enabled auto-merge for PR #${pullNumber}.`);
                return;
              } catch (error) {
                const message = error.message ?? String(error);

                if (message.includes("already enabled")) {
                  core.info(`Auto-merge already enabled for PR #${pullNumber}.`);
                  return;
                }

                if (isUnstable(message) && attempt < 5) {
                  const delayMs = attempt * 5000;
                  core.info(
                    `PR #${pullNumber} is not stable yet (attempt ${attempt}/5). Retrying in ${delayMs / 1000}s...`
                  );
                  await new Promise(resolve => setTimeout(resolve, delayMs));
                  continue;
                }

                if (isUnstable(message)) {
                  core.warning(
                    `PR #${pullNumber} remained unstable after retries. Auto-merge was not enabled in this run.`
                  );
                  return;
                }

                throw error;
              }
            }
