name: Squad Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Restore dependencies
        run: dotnet restore MyBlog.slnx

      - name: Build
        run: |
          dotnet build MyBlog.slnx --configuration Release --no-restore \
            -p:Version=${{ steps.gitversion.outputs.semVer }} \
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }}

      - name: Run unit tests
        run: |
          dotnet test tests/Unit.Tests/Unit.Tests.csproj --configuration Release --no-build --no-restore \
            --logger "trx;LogFileName=domain-results.trx"
          dotnet test tests/Unit.Tests/Unit.Tests.csproj --configuration Release --no-build --no-restore \
            --logger "trx;LogFileName=web-results.trx"
          dotnet test tests/Architecture.Tests --configuration Release --no-build --no-restore \
            --logger "trx;LogFileName=arch-results.trx"
          dotnet test tests/Unit.Tests/Unit.Tests.csproj --configuration Release --no-build --no-restore \
            --logger "trx;LogFileName=bunit-results.trx"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --generate-notes \
            --title "Release $TAG" \
            --verify-tag
