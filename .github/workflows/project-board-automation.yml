name: Project Board Automation

on:
  pull_request:
    types: [opened, reopened, ready_for_review, converted_to_draft, closed]

# repository-projects: write covers Projects v2 for user-owned repos.
# If mutations fail with a 403, store a PAT with 'project' scope as
# secrets.GH_PROJECT_TOKEN and replace secrets.GITHUB_TOKEN below.
permissions:
  issues: read
  pull-requests: read
  repository-projects: write

env:
  PROJECT_ID: PVT_kwHOA5k0b84BXZpa
  STATUS_FIELD_ID: PVTSSF_lAHOA5k0b84BXZpazhSmuGY
  IN_SPRINT_OPTION_ID: f75ad846
  IN_REVIEW_OPTION_ID: 47fc9ee4
  DONE_OPTION_ID: "98236657"
  RELEASED_OPTION_ID: 90af7f3b

jobs:
  update-project-board:
    runs-on: ubuntu-latest

    steps:
      - name: Move linked issues on project board
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GH_PROJECT_TOKEN }}
          script: |
            const action = context.payload.action;
            const pr = context.payload.pull_request;
            const statusTargets = {
              inSprint: {
                optionId: process.env.IN_SPRINT_OPTION_ID,
                columnName: 'In Sprint',
              },
              inReview: {
                optionId: process.env.IN_REVIEW_OPTION_ID,
                columnName: 'In Review',
              },
              done: {
                optionId: process.env.DONE_OPTION_ID,
                columnName: 'Done',
              },
              released: {
                optionId: process.env.RELEASED_OPTION_ID,
                columnName: 'Released',
              },
            };

            const updateStatus = async (itemId, target) => {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId:    $itemId
                    fieldId:   $fieldId
                    value:     { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: process.env.PROJECT_ID,
                itemId,
                fieldId: process.env.STATUS_FIELD_ID,
                optionId: target.optionId,
              });
            };

            const getIssueProjectItem = async issueNumber => {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });

              const projectQuery = await github.graphql(`
                query($nodeId: ID!) {
                  node(id: $nodeId) {
                    ... on Issue {
                      projectItems(first: 20) {
                        nodes {
                          id
                          project { id }
                        }
                      }
                    }
                  }
                }
              `, { nodeId: issue.node_id });

              return projectQuery.node?.projectItems?.nodes?.find(
                item => item.project.id === process.env.PROJECT_ID
              );
            };

            const moveLinkedIssues = async target => {
              const body = pr.body || '';
              const issueNumbers = [...body.matchAll(/(?:closes|fixes|resolves)\s+#(\d+)/gi)]
                .map(match => parseInt(match[1], 10));

              if (issueNumbers.length === 0) {
                core.info(`PR #${pr.number}: no linked issues found — skipping`);
                return;
              }

              core.info(
                `PR #${pr.number} (${action}): moving issues [${issueNumbers.join(', ')}] → ${target.columnName}`
              );

              for (const issueNumber of issueNumbers) {
                try {
                  const projectItem = await getIssueProjectItem(issueNumber);

                  if (!projectItem) {
                    core.warning(`Issue #${issueNumber} is not on the MyBlog project board — skipping`);
                    continue;
                  }

                  await updateStatus(projectItem.id, target);
                  core.info(`✅ Issue #${issueNumber} → ${target.columnName}`);
                } catch (err) {
                  core.warning(`Could not update issue #${issueNumber}: ${err.message}`);
                }
              }
            };

            const getAllProjectItems = async () => {
              const items = [];
              let cursor = null;

              do {
                const project = await github.graphql(`
                  query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          nodes {
                            id
                            fieldValueByName(name: "Status") {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                name
                              }
                            }
                            content {
                              __typename
                              ... on Issue {
                                number
                                title
                              }
                            }
                          }
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                        }
                      }
                    }
                  }
                `, {
                  projectId: process.env.PROJECT_ID,
                  cursor,
                });

                const page = project.node?.items;
                items.push(...(page?.nodes ?? []));
                cursor = page?.pageInfo?.hasNextPage ? page.pageInfo.endCursor : null;
              } while (cursor);

              return items;
            };

            const moveDoneIssuesToReleased = async () => {
              const projectItems = await getAllProjectItems();

              const doneIssues = projectItems.filter(item =>
                item.content?.__typename === 'Issue' &&
                item.fieldValueByName?.name === 'Done'
              ) ?? [];

              if (doneIssues.length === 0) {
                core.info('No Done issues found to move to Released');
                return;
              }

              core.info(`Release merge detected — moving ${doneIssues.length} issue(s) → Released`);

              for (const item of doneIssues) {
                await updateStatus(item.id, statusTargets.released);
                core.info(`✅ Issue #${item.content.number} → Released`);
              }
            };

            const getTargetStatus = () => {
              if (action === 'converted_to_draft') {
                return statusTargets.inSprint;
              }

              if (action === 'closed') {
                return pr.merged ? statusTargets.done : statusTargets.inSprint;
              }

              if (action === 'opened' || action === 'reopened') {
                return pr.draft ? statusTargets.inSprint : statusTargets.inReview;
              }

              if (action === 'ready_for_review') {
                return statusTargets.inReview;
              }

              return null;
            };

            const isReleasePromotion =
              action === 'closed' &&
              pr.merged === true &&
              pr.base.ref === 'main' &&
              pr.head.ref === 'dev';

            if (isReleasePromotion) {
              await moveDoneIssuesToReleased();
              return;
            }

            const target = getTargetStatus();

            if (!target) {
              core.info(`No board transition configured for pull_request.${action}`);
              return;
            }

            await moveLinkedIssues(target);
