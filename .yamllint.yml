---
extends: default
ignore: |
  .squad/
rules:
  document-start: disable
  line-length:
    max: 200
    allow-non-breakable-inline-mappings: true
  truthy:
    allowed-values: ['true', 'false', 'on']
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
